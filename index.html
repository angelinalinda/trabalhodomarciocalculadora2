<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora de gorjetas</title>
</head>
<body>
   <header>
        <img src="./trabalhodomarciocalculadora/images/calculadora-de-gorjeta_base/logo.svg" alt="logo do splitter">
    </header>

    <main>
        <section class="informacoes">

           <form action="">

            <div class="conta">
                <label for="conta">conta</label>
                <div>
                    <img src="./trabalhodomarciocalculadora/images/calculadora-de-gorjeta_base/icon-dollar.svg" alt="ícone do cifrão">
                    <input type="number" name="conta" id="conta" placeholder="0">
                </div>
            </div>

            <div class="gorjeta">
                    <label for="outra">Selecione a gorjeta %</label>   
                
                <div>
                    <input type="button" value="5%">
                    <input type="button" value="10%">
                    <input type="button" value="15%">
                    <input type="button" value="25%">
                    <input type="button" value="50%">
                    <input type="number" name="outra" id="outra" placeholder="Outra">
                </div> 
                </div>

            <div class="pessoas">
                    <label for="pessoas">Quantidade de pessoas</label>
                    <p id="erro">Não pode ser zero</p>
                    <div>
                        <img src="./trabalhodomarciocalculadora/images/calculadora-de-gorjeta_base/icon-person.svg" alt="ícone da pessoa">
                        <input type="number" name="pessoas" id="pessoas" placeholder="0">
                    </div>
            </div>
           </form>
        </section>

        <section class="resultados">
          <div>
                 <div class="gorjeta-total">
                <p>
                    <strong>Gorjeta</strong>
                    <br>
                    / pessoa
                </p>
                <strong>R$ 0.00</strong>
            </div>

            <div class="Total">
                <p>
                    <strong>Total</strong>
                    <br>
                    / pessoa
                </p>
                <strong>R$ 0.00</strong>
            </div>
            </div>
        
            <button>Limpar</button>
        </section>
    </main>
</body>
</html>
